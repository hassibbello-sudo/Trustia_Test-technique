{% extends "base.html" %}

{% block title %}Supprimer un Produit{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-danger">
            <div class="card-body">
                <h2 class="card-title text-danger">⚠️ Confirmer la suppression</h2>
                <p class="card-text">
                    Êtes-vous sûr de vouloir supprimer le produit <strong>{{ produit.nom }}</strong> ?
                </p>
                <p class="text-muted">Cette action est irréversible.</p>
                
                <div class="d-grid gap-2">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg">🗑️ Oui, supprimer</button>
                    </form>
                    <a href="{% url 'liste_produits' %}" class="btn btn-secondary">❌ Annuler</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
